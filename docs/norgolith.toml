rootUrl = 'https://norgolith.amartin.beer'
language = 'en-us'
title = 'Norgolith'
author = 'NTBBloodbath'

# Code blocks highlighting
[highlighter]
enable = true
engine = 'prism'

# RSS Feed
[rss]
enable = true
description = "Latest posts"
ttl = 60
image = "/assets/norgolith.svg"

# SEO: sitemap.xml, OpenGraph meta tags
[seo]
sitemap = true
open_graph = true
default_image = "/assets/norgolith.svg"

# Robots.txt: controls crawler access
[robots]
enable = true
preset = "allow_all"  # options: "allow_all", "no_llms", "block_all"

[extra]
license = "GPLv2"
footer_author_link = "https://github.com/NTBBloodbath"

[extra.nav]
docs = "/docs"
blog = "/posts"
source = "https://github.com/NTBBloodbath/norgolith"

[extra.footer]
GitHub = "https://github.com/NTBBloodbath/norgolith"
